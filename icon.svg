<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0e7490"/>
  <!-- Bottle nipple -->
  <rect x="222" y="60" width="68" height="50" rx="20" fill="white" opacity="0.95"/>
  <!-- Bottle neck -->
  <rect x="208" y="105" width="96" height="55" rx="8" fill="white" opacity="0.95"/>
  <!-- Bottle body -->
  <rect x="160" y="155" width="192" height="260" rx="28" fill="white" opacity="0.95"/>
  <!-- Liquid fill -->
  <rect x="168" y="240" width="176" height="167" rx="20" fill="#67e8f9" opacity="0.6"/>
  <!-- Measurement lines -->
  <line x1="200" y1="280" x2="220" y2="280" stroke="#0e7490" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="310" x2="220" y2="310" stroke="#0e7490" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="340" x2="220" y2="340" stroke="#0e7490" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="370" x2="220" y2="370" stroke="#0e7490" stroke-width="6" stroke-linecap="round"/>
  <!-- Cross / plus symbol -->
  <rect x="236" y="185" width="12" height="36" rx="6" fill="#0e7490" opacity="0.7"/>
  <rect x="220" y="201" width="44" height="12" rx="6" fill="#0e7490" opacity="0.7"/>
</svg>
